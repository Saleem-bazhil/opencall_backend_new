name: opencall-backend

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

x-runtime-hardening: &runtime-hardening
  init: true
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  logging: *default-logging

services:
  postgres:
    image: postgres:16-alpine
    container_name: opencall-postgres
    restart: unless-stopped
    stop_grace_period: 60s
    shm_size: 256mb
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-opencall}
      POSTGRES_USER: ${POSTGRES_USER:-opencall}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/initdb:/docker-entrypoint-initdb.d:ro
      - ./infra/postgres/migrations:/opencall-migrations:ro
      - ./infra/postgres/seeds:/opencall-seeds:ro
    networks:
      - data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} -h 127.0.0.1"]
      interval: 15s
      timeout: 5s
      start_period: 45s
      retries: 12
    logging: *default-logging
    pids_limit: 256
    mem_reservation: 256m
    mem_limit: ${POSTGRES_MEM_LIMIT:-1g}
    cpus: ${POSTGRES_CPUS:-1.0}

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: opencall-api
    restart: on-failure:5
    stop_grace_period: 120s
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgres://${POSTGRES_USER:-opencall}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-opencall}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?set JWT_ACCESS_SECRET}
      UPLOAD_DIR: /app/storage/uploads
      ADMIN_COOKIE_SECRET: ${ADMIN_COOKIE_SECRET:?set ADMIN_COOKIE_SECRET}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:?set ADMIN_SESSION_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:?set CORS_ORIGIN}
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=128m
      - /app/.adminjs:rw,nosuid,nodev,size=32m
    volumes:
      - api-uploads:/app/storage/uploads:rw
    networks:
      - app
      - data
    ports:
      - "${API_PORT:-4000}:4000"
    <<: *runtime-hardening
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4000/api/v1/health/runtime').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 5
    ulimits:
      nofile:
        soft: 4096
        hard: 8192
    pids_limit: 256
    mem_reservation: 512m
    mem_limit: ${API_MEM_LIMIT:-1536m}
    cpus: ${API_CPUS:-1.5}

networks:
  app:
    name: opencall-backend-app
  data:
    name: opencall-backend-data
    internal: true

volumes:
  postgres-data:
    name: opencall-postgres-data
  api-uploads:
    name: opencall-api-uploads
