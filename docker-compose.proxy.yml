name: opencall-backend

services:
  caddy:
    image: caddy:2.8-alpine
    container_name: opencall-api-caddy
    restart: unless-stopped
    init: true
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_DOMAIN: ${API_DOMAIN:?set API_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL}
      MAX_UPLOAD_SIZE: ${MAX_UPLOAD_SIZE:-80MB}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "${HTTPS_PORT:-443}:443/udp"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - app
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "caddy validate --config /etc/caddy/Caddyfile"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    mem_reservation: 128m
    mem_limit: ${CADDY_MEM_LIMIT:-256m}
    cpus: ${CADDY_CPUS:-0.5}

volumes:
  caddy-data:
    name: opencall-api-caddy-data
  caddy-config:
    name: opencall-api-caddy-config
